<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>아무 웹사이트</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f1e8;
        --panel: rgba(255, 252, 246, 0.88);
        --text: #1f1a17;
        --muted: #685b52;
        --accent: #e26d32;
        --accent-soft: #f0b38f;
        --line: rgba(31, 26, 23, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Avenir Next", "Segoe UI", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top left, rgba(226, 109, 50, 0.22), transparent 28%),
          radial-gradient(circle at bottom right, rgba(68, 126, 137, 0.2), transparent 32%),
          linear-gradient(135deg, #f9f4ec 0%, #efe1cf 100%);
      }

      main {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .card {
        width: min(720px, 100%);
        padding: 40px;
        border: 1px solid var(--line);
        border-radius: 28px;
        background: var(--panel);
        backdrop-filter: blur(16px);
        box-shadow: 0 24px 70px rgba(31, 26, 23, 0.12);
      }

      .eyebrow {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 20px;
        font-size: 0.85rem;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--muted);
      }

      .eyebrow::before {
        content: "";
        width: 32px;
        height: 2px;
        background: var(--accent);
      }

      h1 {
        margin: 0;
        font-size: clamp(2.8rem, 8vw, 5.2rem);
        line-height: 0.95;
      }

      p {
        margin: 18px 0 0;
        max-width: 42rem;
        font-size: 1.08rem;
        line-height: 1.7;
        color: var(--muted);
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 28px;
      }

      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 170px;
        padding: 14px 18px;
        border-radius: 999px;
        font-weight: 700;
        text-decoration: none;
        transition: transform 160ms ease, box-shadow 160ms ease, background 160ms ease;
      }

      a:hover {
        transform: translateY(-2px);
      }

      .primary {
        color: white;
        background: linear-gradient(135deg, var(--accent) 0%, #c94b2b 100%);
        box-shadow: 0 14px 28px rgba(201, 75, 43, 0.22);
      }

      .secondary {
        color: var(--text);
        background: rgba(255, 255, 255, 0.6);
        border: 1px solid var(--line);
      }

      .meta {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
        gap: 14px;
        margin-top: 34px;
      }

      .meta div {
        padding: 16px 18px;
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.55);
        border: 1px solid rgba(31, 26, 23, 0.08);
      }

      .meta strong {
        display: block;
        font-size: 1.2rem;
        margin-bottom: 6px;
      }

      @media (max-width: 640px) {
        .card {
          padding: 28px 22px;
          border-radius: 24px;
        }

        .actions a {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="card">
        <span class="eyebrow">Smallest Complete Site</span>
        <h1>아무 웹사이트,<br />바로 열리는 한 장.</h1>
        <p>
          빈 저장소 기준으로 가장 작은 완성 형태를 만들었습니다. 이 파일 하나만 열어도
          랜딩 페이지처럼 보이고, 다음 CEO 의사결정 사이클에서 방향을 정할 수 있는
          실체가 됩니다.
        </p>
        <div class="actions">
          <a class="primary" href="#result">결과 확인하기</a>
          <a class="secondary" href="mailto:ceo@example.com">다음 결정 요청</a>
        </div>
        <div class="meta" id="result">
          <div>
            <strong>1 file</strong>
            바로 배포 가능한 정적 페이지
          </div>
          <div>
            <strong>Mobile</strong>
            작은 화면에서도 한 번에 읽힘
          </div>
          <div>
            <strong>Handoff</strong>
            다음 사이클에서 확장 여부 판단 가능
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
