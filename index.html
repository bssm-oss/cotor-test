<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>카톡 웹 | TEst</title>
    <style>
      :root {
        --bg: #f1f2f5;
        --shell: #ffffff;
        --panel: #f7f8fa;
        --sidebar: #eef1f5;
        --line: #d9dee7;
        --text: #191919;
        --muted: #657080;
        --yellow: #fae100;
        --yellow-strong: #f3d400;
        --bubble-me: #fae100;
        --bubble-other: #ffffff;
        --shadow: 0 24px 60px rgba(15, 23, 42, 0.12);
        --radius-lg: 28px;
        --radius-md: 20px;
        --radius-sm: 14px;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "IBM Plex Sans KR", "Apple SD Gothic Neo", "Noto Sans KR",
          sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top left, rgba(250, 225, 0, 0.28), transparent 28%),
          linear-gradient(180deg, #f8fafc 0%, var(--bg) 100%);
      }

      main {
        width: min(1240px, calc(100% - 24px));
        margin: 0 auto;
        padding: 24px 0;
      }

      .app {
        display: grid;
        grid-template-columns: minmax(280px, 340px) minmax(0, 1fr);
        min-height: calc(100vh - 48px);
        overflow: hidden;
        border: 1px solid rgba(25, 25, 25, 0.08);
        border-radius: var(--radius-lg);
        background: var(--shell);
        box-shadow: var(--shadow);
      }

      .sidebar {
        display: grid;
        grid-template-rows: auto auto minmax(0, 1fr);
        background: var(--sidebar);
        border-right: 1px solid var(--line);
      }

      .brand,
      .search {
        padding: 20px 20px 16px;
      }

      .brand {
        border-bottom: 1px solid rgba(25, 25, 25, 0.06);
      }

      .badge {
        display: inline-flex;
        align-items: center;
        min-height: 36px;
        padding: 0 14px;
        border-radius: 999px;
        background: rgba(25, 25, 25, 0.06);
        font-size: 0.92rem;
        font-weight: 700;
      }

      h1 {
        margin: 14px 0 10px;
        font-size: clamp(2rem, 5vw, 2.8rem);
        line-height: 0.95;
        letter-spacing: -0.04em;
      }

      p {
        margin: 0;
        color: var(--muted);
        line-height: 1.6;
      }

      .search {
        display: grid;
        gap: 10px;
      }

      label {
        font-size: 0.92rem;
        font-weight: 700;
      }

      input,
      textarea,
      button {
        font: inherit;
      }

      .search input,
      .composer textarea {
        width: 100%;
        border: 1px solid transparent;
        border-radius: var(--radius-sm);
        background: rgba(255, 255, 255, 0.92);
        color: var(--text);
      }

      .search input {
        min-height: 46px;
        padding: 0 16px;
      }

      .search input:focus-visible,
      .composer textarea:focus-visible,
      .chat-room:focus-visible,
      .send-button:focus-visible {
        outline: 3px solid rgba(48, 84, 255, 0.2);
        outline-offset: 2px;
      }

      .chat-list {
        display: grid;
        gap: 10px;
        padding: 0 14px 14px;
        overflow: auto;
      }

      .chat-room {
        width: 100%;
        display: grid;
        gap: 6px;
        padding: 16px;
        border: 1px solid transparent;
        border-radius: var(--radius-md);
        background: rgba(255, 255, 255, 0.76);
        text-align: left;
        cursor: pointer;
        transition:
          transform 160ms ease,
          border-color 160ms ease,
          background-color 160ms ease;
      }

      .chat-room:hover {
        transform: translateY(-1px);
        border-color: rgba(25, 25, 25, 0.08);
      }

      .chat-room.active {
        background: #ffffff;
        border-color: rgba(25, 25, 25, 0.12);
      }

      .chat-room-top,
      .chat-room-bottom {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .chat-room-name {
        font-weight: 700;
      }

      .chat-room-preview,
      .chat-room-time {
        color: var(--muted);
        font-size: 0.92rem;
      }

      .chat-room-count {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 26px;
        height: 26px;
        padding: 0 8px;
        border-radius: 999px;
        background: var(--yellow);
        font-size: 0.84rem;
        font-weight: 700;
      }

      .workspace {
        display: grid;
        grid-template-rows: auto minmax(0, 1fr) auto;
        background: linear-gradient(180deg, #b9d0e6 0%, #dfe8f1 100%);
      }

      .room-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 20px;
        padding: 20px 24px;
        background: rgba(255, 255, 255, 0.72);
        border-bottom: 1px solid rgba(25, 25, 25, 0.08);
        backdrop-filter: blur(8px);
      }

      .room-title {
        display: grid;
        gap: 6px;
      }

      .room-title strong {
        font-size: 1.2rem;
      }

      .presence {
        color: var(--muted);
        font-size: 0.92rem;
      }

      .status-pill {
        display: inline-flex;
        align-items: center;
        min-height: 38px;
        padding: 0 14px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.92);
        font-size: 0.92rem;
        font-weight: 700;
      }

      .messages {
        display: grid;
        align-content: start;
        gap: 12px;
        padding: 24px;
        overflow: auto;
      }

      .date-divider {
        justify-self: center;
        padding: 8px 14px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.74);
        color: var(--muted);
        font-size: 0.88rem;
      }

      .message-row {
        display: flex;
      }

      .message-row.me {
        justify-content: flex-end;
      }

      .message-row.other {
        justify-content: flex-start;
      }

      .bubble-wrap {
        display: grid;
        gap: 6px;
        max-width: min(78%, 520px);
      }

      .sender {
        color: #3a4656;
        font-size: 0.88rem;
        font-weight: 700;
      }

      .bubble-line {
        display: flex;
        align-items: end;
        gap: 8px;
      }

      .bubble {
        padding: 12px 14px;
        border-radius: 18px;
        background: var(--bubble-other);
        box-shadow: 0 8px 22px rgba(15, 23, 42, 0.08);
        line-height: 1.55;
        word-break: break-word;
      }

      .message-row.me .bubble {
        background: var(--bubble-me);
        border-bottom-right-radius: 6px;
      }

      .message-row.other .bubble {
        border-bottom-left-radius: 6px;
      }

      .timestamp {
        color: var(--muted);
        font-size: 0.8rem;
        white-space: nowrap;
      }

      .composer {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 12px;
        padding: 16px 20px 20px;
        background: rgba(255, 255, 255, 0.74);
        border-top: 1px solid rgba(25, 25, 25, 0.08);
      }

      .composer textarea {
        min-height: 64px;
        max-height: 160px;
        resize: vertical;
        padding: 14px 16px;
      }

      .send-button {
        align-self: end;
        min-width: 112px;
        min-height: 64px;
        padding: 0 18px;
        border: 0;
        border-radius: 18px;
        background: var(--yellow);
        color: var(--text);
        cursor: pointer;
        font-weight: 700;
        transition:
          transform 160ms ease,
          background-color 160ms ease;
      }

      .send-button:hover {
        transform: translateY(-1px);
        background: var(--yellow-strong);
      }

      .composer-note {
        grid-column: 1 / -1;
        color: var(--muted);
        font-size: 0.88rem;
      }

      @media (max-width: 920px) {
        .app {
          grid-template-columns: 1fr;
        }

        .sidebar {
          grid-template-rows: auto auto auto;
        }

        .chat-list {
          grid-auto-flow: column;
          grid-auto-columns: minmax(220px, 1fr);
          overflow-x: auto;
          overflow-y: hidden;
          padding-bottom: 20px;
        }

        .workspace {
          min-height: 70vh;
        }
      }

      @media (max-width: 640px) {
        main {
          width: 100%;
          padding: 0;
        }

        .app {
          min-height: 100vh;
          border: 0;
          border-radius: 0;
        }

        .brand,
        .search,
        .room-header,
        .messages,
        .composer {
          padding-left: 16px;
          padding-right: 16px;
        }

        .composer {
          grid-template-columns: 1fr;
        }

        .send-button {
          width: 100%;
          min-height: 52px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="app" aria-label="카톡 웹 데모">
        <aside class="sidebar" aria-label="채팅방 목록">
          <div class="brand">
            <span class="badge">TEst Messenger</span>
            <h1>카톡 웹</h1>
            <p>
              첫 구현 슬라이스입니다. 채팅방 전환, 메시지 전송, 간단한 자동 응답까지 브라우저 안에서
              바로 확인할 수 있습니다.
            </p>
          </div>
          <div class="search">
            <label for="room-search">채팅방 검색</label>
            <input
              id="room-search"
              type="search"
              placeholder="이름 또는 메시지로 검색"
              autocomplete="off"
            />
          </div>
          <div class="chat-list" id="chat-list"></div>
        </aside>
        <section class="workspace" aria-label="대화 영역">
          <header class="room-header">
            <div class="room-title">
              <strong id="room-name">채팅방</strong>
              <span class="presence" id="room-presence">참여자 상태</span>
            </div>
            <div class="status-pill" id="room-meta">읽음 상태</div>
          </header>
          <div class="messages" id="message-list" aria-live="polite"></div>
          <form class="composer" id="composer">
            <label class="sr-only" for="message-input" hidden>메시지 입력</label>
            <textarea
              id="message-input"
              placeholder="메시지를 입력하세요"
              maxlength="280"
              required
            ></textarea>
            <button class="send-button" type="submit">전송</button>
            <div class="composer-note" id="composer-note">
              엔터 대신 버튼으로 전송하는 1차 슬라이스입니다.
            </div>
          </form>
        </section>
      </section>
    </main>
    <script>
      const roomSearchInput = document.getElementById("room-search");
      const chatList = document.getElementById("chat-list");
      const roomName = document.getElementById("room-name");
      const roomPresence = document.getElementById("room-presence");
      const roomMeta = document.getElementById("room-meta");
      const messageList = document.getElementById("message-list");
      const composer = document.getElementById("composer");
      const messageInput = document.getElementById("message-input");
      const composerNote = document.getElementById("composer-note");

      const rooms = [
        {
          id: "team-launch",
          name: "런치 TF",
          presence: "3명 참여 중 · 민지 방금 읽음",
          unread: 2,
          messages: [
            { sender: "system", text: "2026년 4월 6일 월요일", time: "" },
            {
              sender: "민지",
              side: "other",
              text: "웹 첫 슬라이스 확인했어요? 오후 3시에 짧게 맞출게요.",
              time: "오후 2:41",
            },
            {
              sender: "준호",
              side: "other",
              text: "채팅 목록하고 메시지 전송까지 나오면 데모는 충분할 것 같아요.",
              time: "오후 2:43",
            },
            {
              sender: "나",
              side: "me",
              text: "좋아요. 우선 브라우저 단일 파일로 붙여서 바로 검증 가능하게 만들겠습니다.",
              time: "오후 2:45",
            },
          ],
        },
        {
          id: "design-sync",
          name: "디자인 싱크",
          presence: "2명 참여 중 · 서연 입력 가능",
          unread: 0,
          messages: [
            { sender: "system", text: "2026년 4월 6일 월요일", time: "" },
            {
              sender: "서연",
              side: "other",
              text: "카톡 느낌은 살리되 복제처럼 보이진 않게 톤만 맞춰 주세요.",
              time: "오후 1:08",
            },
            {
              sender: "나",
              side: "me",
              text: "네. 노란 포인트와 말풍선 구조만 가져가고 자체 레이아웃으로 정리할게요.",
              time: "오후 1:10",
            },
          ],
        },
        {
          id: "ops-alert",
          name: "운영 알림",
          presence: "시스템 채널 · 자동 응답 연결됨",
          unread: 1,
          messages: [
            { sender: "system", text: "2026년 4월 6일 월요일", time: "" },
            {
              sender: "운영봇",
              side: "other",
              text: "현재 데모 환경은 로컬 브라우저 상태만 사용합니다.",
              time: "오전 11:20",
            },
          ],
        },
      ];

      let activeRoomId = rooms[0].id;

      const getActiveRoom = () => rooms.find((room) => room.id === activeRoomId) ?? rooms[0];

      const formatPreview = (room) => {
        const lastMessage = room.messages[room.messages.length - 1];
        return lastMessage?.text ?? "메시지가 없습니다.";
      };

      const renderRoomList = () => {
        if (!chatList || !roomSearchInput) {
          return;
        }

        const keyword = roomSearchInput.value.trim();
        const filteredRooms = rooms.filter((room) => {
          if (!keyword) {
            return true;
          }

          return `${room.name} ${formatPreview(room)}`.includes(keyword);
        });

        chatList.replaceChildren(
          ...filteredRooms.map((room) => {
            const button = document.createElement("button");
            button.type = "button";
            button.className = `chat-room${room.id === activeRoomId ? " active" : ""}`;
            button.setAttribute("aria-pressed", String(room.id === activeRoomId));
            button.dataset.roomId = room.id;

            const top = document.createElement("div");
            top.className = "chat-room-top";

            const name = document.createElement("span");
            name.className = "chat-room-name";
            name.textContent = room.name;

            const time = document.createElement("span");
            time.className = "chat-room-time";
            time.textContent = room.messages[room.messages.length - 1]?.time ?? "";

            top.append(name, time);

            const bottom = document.createElement("div");
            bottom.className = "chat-room-bottom";

            const preview = document.createElement("span");
            preview.className = "chat-room-preview";
            preview.textContent = formatPreview(room);

            bottom.append(preview);

            if (room.unread > 0) {
              const count = document.createElement("span");
              count.className = "chat-room-count";
              count.textContent = String(room.unread);
              bottom.append(count);
            }

            button.append(top, bottom);
            return button;
          })
        );
      };

      const renderMessages = () => {
        const room = getActiveRoom();
        if (!messageList || !roomName || !roomPresence || !roomMeta) {
          return;
        }

        roomName.textContent = room.name;
        roomPresence.textContent = room.presence;
        roomMeta.textContent = room.unread > 0 ? `안 읽은 메시지 ${room.unread}` : "모두 읽음";

        messageList.replaceChildren(
          ...room.messages.map((message) => {
            if (message.sender === "system") {
              const divider = document.createElement("div");
              divider.className = "date-divider";
              divider.textContent = message.text;
              return divider;
            }

            const row = document.createElement("div");
            row.className = `message-row ${message.side}`;

            const wrap = document.createElement("div");
            wrap.className = "bubble-wrap";

            if (message.side === "other") {
              const sender = document.createElement("div");
              sender.className = "sender";
              sender.textContent = message.sender;
              wrap.append(sender);
            }

            const line = document.createElement("div");
            line.className = "bubble-line";

            const bubble = document.createElement("div");
            bubble.className = "bubble";
            bubble.textContent = message.text;

            const stamp = document.createElement("span");
            stamp.className = "timestamp";
            stamp.textContent = message.time;

            if (message.side === "me") {
              line.append(stamp, bubble);
            } else {
              line.append(bubble, stamp);
            }

            wrap.append(line);
            row.append(wrap);
            return row;
          })
        );

        messageList.scrollTop = messageList.scrollHeight;
      };

      const switchRoom = (roomId) => {
        activeRoomId = roomId;
        const room = getActiveRoom();
        room.unread = 0;
        renderRoomList();
        renderMessages();
      };

      const appendMessage = (roomId, message) => {
        const room = rooms.find((item) => item.id === roomId);
        if (!room) {
          return;
        }

        room.messages.push(message);
      };

      const makeAutoReply = (room) => {
        const replies = {
          "런치 TF": "확인했습니다. 이 정도면 데모에서 핵심 플로우는 바로 보이겠네요.",
          "디자인 싱크": "좋아요. 말풍선 간격과 배경 대비도 지금 정도면 충분히 읽힙니다.",
          "운영 알림": "자동 응답: 다음 단계에서는 서버 저장과 로그인 연동이 필요합니다.",
        };

        return replies[room.name] ?? "메시지 받았습니다.";
      };

      const sendMessage = () => {
        if (!messageInput || !composerNote) {
          return;
        }

        const text = messageInput.value.trim();
        if (!text) {
          composerNote.textContent = "빈 메시지는 전송할 수 없습니다.";
          return;
        }

        const room = getActiveRoom();
        appendMessage(room.id, {
          sender: "나",
          side: "me",
          text,
          time: "방금",
        });
        composerNote.textContent = `"${room.name}" 채팅방에 메시지를 보냈습니다.`;
        messageInput.value = "";
        renderRoomList();
        renderMessages();

        window.setTimeout(() => {
          appendMessage(room.id, {
            sender: room.name === "운영 알림" ? "운영봇" : room.name === "디자인 싱크" ? "서연" : "민지",
            side: "other",
            text: makeAutoReply(room),
            time: "방금",
          });

          if (room.id !== activeRoomId) {
            room.unread += 1;
          }

          renderRoomList();
          renderMessages();
        }, 600);
      };

      chatList?.addEventListener("click", (event) => {
        const target = event.target;
        if (!(target instanceof HTMLElement)) {
          return;
        }

        const button = target.closest(".chat-room");
        const roomId = button?.getAttribute("data-room-id");
        if (!roomId) {
          return;
        }

        switchRoom(roomId);
      });

      roomSearchInput?.addEventListener("input", renderRoomList);

      composer?.addEventListener("submit", (event) => {
        event.preventDefault();
        sendMessage();
      });

      renderRoomList();
      renderMessages();
    </script>
  </body>
</html>
