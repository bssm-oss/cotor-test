<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>카카오톡 웹 | KakaoTalk Web</title>
    <style>
      :root {
        --kakao-yellow: #FEE500;
        --kakao-brown: #3C1E1E;
        --kakao-bg: #FFFFFF;
        --kakao-bg-secondary: #F2F3F4;
        --kakao-text: #191919;
        --kakao-text-secondary: #8B8B8B;
        --kakao-bubble-me: #FEE500;
        --kakao-bubble-other: #FFFFFF;
        --kakao-border: #E8E8E8;
        --kakao-green: #97CB00;
        --kakao-red: #FF3B30;
        --kakao-radius: 16px;
        --kakao-radius-sm: 8px;
        --kakao-space-1: 4px;
        --kakao-space-2: 8px;
        --kakao-space-3: 12px;
        --kakao-space-4: 16px;
        --kakao-space-5: 24px;
        --kakao-space-6: 32px;
        --kakao-header-h: 56px;
        --kakao-sidebar-w: 320px;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo",
          "Malgun Gothic", "Noto Sans KR", sans-serif;
        color: var(--kakao-text);
        background: var(--kakao-bg-secondary);
        height: 100vh;
        overflow: hidden;
      }

      /* ── Layout ── */
      .app {
        display: grid;
        grid-template-columns: var(--kakao-sidebar-w) 1fr;
        height: 100vh;
        max-width: 1200px;
        margin: 0 auto;
        background: var(--kakao-bg);
        box-shadow: 0 0 40px rgba(0, 0, 0, 0.08);
      }

      @media (max-width: 768px) {
        .app {
          grid-template-columns: 1fr;
        }
        .sidebar {
          display: none;
        }
        .sidebar.active {
          display: block;
        }
        .chat-area {
          display: none;
        }
        .chat-area.active {
          display: flex;
        }
      }

      /* ── Sidebar ── */
      .sidebar {
        display: flex;
        flex-direction: column;
        border-right: 1px solid var(--kakao-border);
        background: var(--kakao-bg);
      }

      .sidebar-header {
        height: var(--kakao-header-h);
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 var(--kakao-space-4);
        border-bottom: 1px solid var(--kakao-border);
        flex-shrink: 0;
      }

      .sidebar-header h1 {
        font-size: 1.1rem;
        font-weight: 700;
        color: var(--kakao-text);
      }

      .sidebar-header .logo {
        display: flex;
        align-items: center;
        gap: var(--kakao-space-2);
      }

      .sidebar-header .logo-icon {
        width: 28px;
        height: 28px;
        background: var(--kakao-yellow);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1rem;
      }

      .search-box {
        padding: var(--kakao-space-3) var(--kakao-space-4);
        border-bottom: 1px solid var(--kakao-border);
        flex-shrink: 0;
      }

      .search-box input {
        width: 100%;
        height: 36px;
        padding: 0 var(--kakao-space-3);
        border: 1px solid var(--kakao-border);
        border-radius: 999px;
        background: var(--kakao-bg-secondary);
        font: inherit;
        font-size: 0.9rem;
        color: var(--kakao-text);
      }

      .search-box input:focus {
        outline: none;
        border-color: var(--kakao-yellow);
        background: var(--kakao-bg);
      }

      .tab-bar {
        display: flex;
        border-bottom: 1px solid var(--kakao-border);
        flex-shrink: 0;
      }

      .tab-btn {
        flex: 1;
        height: 44px;
        border: none;
        background: transparent;
        font: inherit;
        font-size: 0.9rem;
        font-weight: 600;
        color: var(--kakao-text-secondary);
        cursor: pointer;
        position: relative;
        transition: color 150ms ease;
      }

      .tab-btn.active {
        color: var(--kakao-text);
      }

      .tab-btn.active::after {
        content: "";
        position: absolute;
        bottom: 0;
        left: 20%;
        right: 20%;
        height: 3px;
        background: var(--kakao-yellow);
        border-radius: 3px 3px 0 0;
      }

      .tab-btn:hover {
        color: var(--kakao-text);
      }

      .sidebar-content {
        flex: 1;
        overflow-y: auto;
        overscroll-behavior: contain;
      }

      .chat-list {
        display: block;
      }

      .chat-list.hidden {
        display: none;
      }

      .friend-list {
        display: none;
      }

      .friend-list.visible {
        display: block;
      }

      .friend-section-header {
        padding: var(--kakao-space-2) var(--kakao-space-4);
        font-size: 0.78rem;
        font-weight: 700;
        color: var(--kakao-text-secondary);
        background: var(--kakao-bg-secondary);
        letter-spacing: 0.02em;
      }

      .friend-item {
        display: flex;
        align-items: center;
        gap: var(--kakao-space-3);
        padding: var(--kakao-space-3) var(--kakao-space-4);
        cursor: pointer;
        transition: background 120ms ease;
        border-bottom: 1px solid rgba(0, 0, 0, 0.04);
      }

      .friend-item:hover,
      .friend-item:focus-visible {
        background: var(--kakao-bg-secondary);
      }

      .friend-item:focus-visible {
        outline: 2px solid var(--kakao-yellow);
        outline-offset: -2px;
      }

      .friend-info {
        flex: 1;
        min-width: 0;
      }

      .friend-name {
        font-weight: 600;
        font-size: 0.92rem;
        margin-bottom: 2px;
      }

      .friend-status-text {
        font-size: 0.8rem;
        color: var(--kakao-text-secondary);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .friend-status-dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        flex-shrink: 0;
        position: relative;
      }

      .friend-status-dot.online {
        background: var(--kakao-green);
        box-shadow: 0 0 0 2px rgba(151, 203, 0, 0.3);
      }

      .friend-status-dot.offline {
        background: var(--kakao-text-secondary);
        opacity: 0.4;
      }

      .friend-actions {
        flex-shrink: 0;
        display: flex;
        gap: var(--kakao-space-1);
      }

      .friend-msg-btn {
        width: 32px;
        height: 32px;
        border: none;
        border-radius: 50%;
        background: var(--kakao-yellow);
        color: var(--kakao-brown);
        font-size: 0.85rem;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background 120ms ease, transform 120ms ease;
      }

      .friend-msg-btn:hover:not(:disabled) {
        background: #e6cf00;
        transform: scale(1.08);
      }

      .friend-msg-btn:active:not(:disabled) {
        transform: scale(0.95);
      }

      .friend-msg-btn:focus-visible {
        outline: 2px solid var(--kakao-brown);
        outline-offset: 2px;
      }

      .chat-item {
        display: flex;
        align-items: center;
        gap: var(--kakao-space-3);
        padding: var(--kakao-space-4);
        cursor: pointer;
        transition: background 120ms ease;
        border-bottom: 1px solid rgba(0, 0, 0, 0.04);
      }

      .chat-item:hover,
      .chat-item:focus-visible {
        background: var(--kakao-bg-secondary);
      }

      .chat-item.active {
        background: rgba(254, 229, 0, 0.12);
      }

      .chat-item:focus-visible {
        outline: 2px solid var(--kakao-yellow);
        outline-offset: -2px;
      }

      .avatar {
        width: 48px;
        height: 48px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.3rem;
        flex-shrink: 0;
        color: #fff;
        font-weight: 700;
      }

      .chat-info {
        flex: 1;
        min-width: 0;
      }

      .chat-name {
        font-weight: 700;
        font-size: 0.95rem;
        margin-bottom: 2px;
      }

      .chat-preview {
        font-size: 0.85rem;
        color: var(--kakao-text-secondary);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .chat-meta {
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 4px;
        flex-shrink: 0;
      }

      .chat-time {
        font-size: 0.75rem;
        color: var(--kakao-text-secondary);
      }

      .chat-badge {
        min-width: 18px;
        height: 18px;
        padding: 0 5px;
        border-radius: 999px;
        background: var(--kakao-red);
        color: #fff;
        font-size: 0.7rem;
        font-weight: 700;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      /* ── Connection Status Bar ── */
      .connection-bar {
        padding: var(--kakao-space-2) var(--kakao-space-4);
        font-size: 0.8rem;
        font-weight: 600;
        text-align: center;
        transition: background 200ms ease, color 200ms ease;
        flex-shrink: 0;
      }

      .connection-bar.connected {
        background: rgba(151, 203, 0, 0.12);
        color: var(--kakao-green);
      }

      .connection-bar.disconnected {
        background: rgba(255, 59, 48, 0.1);
        color: var(--kakao-red);
      }

      .connection-bar.reconnecting {
        background: rgba(254, 229, 0, 0.25);
        color: var(--kakao-brown);
      }

      /* ── Chat Area ── */
      .chat-area {
        display: flex;
        flex-direction: column;
        background: var(--kakao-bg);
      }

      .chat-header {
        height: var(--kakao-header-h);
        display: flex;
        align-items: center;
        gap: var(--kakao-space-3);
        padding: 0 var(--kakao-space-4);
        border-bottom: 1px solid var(--kakao-border);
        flex-shrink: 0;
      }

      .chat-header .back-btn {
        display: none;
        width: 32px;
        height: 32px;
        border: none;
        background: transparent;
        font-size: 1.2rem;
        cursor: pointer;
        border-radius: var(--kakao-radius-sm);
      }

      @media (max-width: 768px) {
        .chat-header .back-btn {
          display: flex;
          align-items: center;
          justify-content: center;
        }
      }

      .chat-header .back-btn:hover {
        background: var(--kakao-bg-secondary);
      }

      .chat-header .chat-title {
        font-weight: 700;
        font-size: 1rem;
      }

      .chat-header .chat-status {
        font-size: 0.8rem;
        color: var(--kakao-green);
        margin-left: auto;
      }

      .chat-header .chat-status.offline {
        color: var(--kakao-text-secondary);
      }

      /* ── Messages ── */
      .messages {
        flex: 1;
        overflow-y: auto;
        padding: var(--kakao-space-4);
        display: flex;
        flex-direction: column;
        gap: var(--kakao-space-2);
        background: var(--kakao-bg-secondary);
        overscroll-behavior: contain;
      }

      .message-group {
        display: flex;
        flex-direction: column;
        gap: 2px;
      }

      .message-group.sent {
        align-items: flex-end;
      }

      .message-group.received {
        align-items: flex-start;
      }

      .message-meta {
        display: flex;
        align-items: center;
        gap: var(--kakao-space-2);
        margin-bottom: 2px;
      }

      .message-group.sent .message-meta {
        flex-direction: row-reverse;
      }

      .message-sender {
        font-size: 0.78rem;
        font-weight: 600;
        color: var(--kakao-text-secondary);
      }

      .message-time-stamp {
        font-size: 0.72rem;
        color: var(--kakao-text-secondary);
      }

      .message-bubble {
        max-width: 70%;
        padding: var(--kakao-space-3) var(--kakao-space-4);
        border-radius: var(--kakao-radius);
        font-size: 0.92rem;
        line-height: 1.5;
        word-break: break-word;
        position: relative;
      }

      .message-group.sent .message-bubble {
        background: var(--kakao-bubble-me);
        border-bottom-right-radius: var(--kakao-radius-sm);
      }

      .message-group.received .message-bubble {
        background: var(--kakao-bubble-other);
        border: 1px solid var(--kakao-border);
        border-bottom-left-radius: var(--kakao-radius-sm);
      }

      .message-bubble.failed {
        opacity: 0.6;
        border: 1px dashed var(--kakao-red);
      }

      .message-bubble.failed::after {
        content: "전송 실패";
        display: block;
        font-size: 0.72rem;
        color: var(--kakao-red);
        margin-top: 4px;
        font-weight: 600;
      }

      .message-bubble.pending {
        opacity: 0.7;
      }

      .message-bubble.pending::after {
        content: "전송 중...";
        display: block;
        font-size: 0.72rem;
        color: var(--kakao-text-secondary);
        margin-top: 4px;
      }

      .message-bubble.read {
        border-bottom-right-radius: var(--kakao-radius-sm);
      }

      .message-bubble.read::after {
        content: "1";
        position: absolute;
        bottom: -16px;
        right: 0;
        font-size: 0.68rem;
        color: var(--kakao-text-secondary);
      }

      .date-divider {
        text-align: center;
        margin: var(--kakao-space-4) 0;
      }

      .date-divider span {
        display: inline-block;
        padding: 4px 12px;
        background: rgba(0, 0, 0, 0.06);
        border-radius: 999px;
        font-size: 0.78rem;
        color: var(--kakao-text-secondary);
      }

      .system-message {
        text-align: center;
        font-size: 0.82rem;
        color: var(--kakao-text-secondary);
        padding: var(--kakao-space-2) 0;
      }

      /* ── Error Toast ── */
      .error-toast {
        position: fixed;
        bottom: 80px;
        left: 50%;
        transform: translateX(-50%) translateY(20px);
        background: var(--kakao-brown);
        color: #fff;
        padding: var(--kakao-space-3) var(--kakao-space-5);
        border-radius: 999px;
        font-size: 0.88rem;
        font-weight: 600;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.18);
        opacity: 0;
        pointer-events: none;
        transition: opacity 200ms ease, transform 200ms ease;
        z-index: 1000;
      }

      .error-toast.visible {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
        pointer-events: auto;
      }

      /* ── Input Area ── */
      .input-area {
        display: flex;
        align-items: flex-end;
        gap: var(--kakao-space-2);
        padding: var(--kakao-space-3) var(--kakao-space-4);
        border-top: 1px solid var(--kakao-border);
        background: var(--kakao-bg);
        flex-shrink: 0;
      }

      .input-area textarea {
        flex: 1;
        min-height: 36px;
        max-height: 120px;
        padding: var(--kakao-space-2) var(--kakao-space-3);
        border: 1px solid var(--kakao-border);
        border-radius: var(--kakao-radius);
        background: var(--kakao-bg-secondary);
        font: inherit;
        font-size: 0.92rem;
        color: var(--kakao-text);
        resize: none;
        line-height: 1.4;
      }

      .input-area textarea:focus {
        outline: none;
        border-color: var(--kakao-yellow);
        background: var(--kakao-bg);
      }

      .input-area textarea:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .send-btn {
        width: 36px;
        height: 36px;
        border: none;
        border-radius: 50%;
        background: var(--kakao-yellow);
        color: var(--kakao-brown);
        font-size: 1.1rem;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background 120ms ease, transform 120ms ease;
        flex-shrink: 0;
      }

      .send-btn:hover:not(:disabled) {
        background: #e6cf00;
      }

      .send-btn:active:not(:disabled) {
        transform: scale(0.92);
      }

      .send-btn:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }

      .send-btn:focus-visible {
        outline: 3px solid rgba(254, 229, 0, 0.5);
        outline-offset: 2px;
      }

      /* ── Empty State ── */
      .empty-state {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: var(--kakao-space-4);
        color: var(--kakao-text-secondary);
      }

      .empty-state .icon {
        font-size: 3rem;
        opacity: 0.4;
      }

      .empty-state p {
        font-size: 0.95rem;
      }

      /* ── Retry Button ── */
      .retry-btn {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        padding: 2px 8px;
        border: 1px solid var(--kakao-red);
        border-radius: 999px;
        background: transparent;
        color: var(--kakao-red);
        font-size: 0.72rem;
        font-weight: 600;
        cursor: pointer;
        margin-top: 4px;
      }

      .retry-btn:hover {
        background: rgba(255, 59, 48, 0.08);
      }

      /* ── Loading Spinner ── */
      @keyframes spin {
        to { transform: rotate(360deg); }
      }

      .spinner {
        width: 16px;
        height: 16px;
        border: 2px solid var(--kakao-border);
        border-top-color: var(--kakao-yellow);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }

      .loading-overlay {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(255, 255, 255, 0.85);
        z-index: 10;
        opacity: 0;
        pointer-events: none;
        transition: opacity 200ms ease;
      }

      .loading-overlay.visible {
        opacity: 1;
        pointer-events: auto;
      }
    </style>
  </head>
  <body>
    <div class="app" id="app">
      <!-- Sidebar -->
      <aside class="sidebar active" id="sidebar" aria-label="사이드바">
        <div class="sidebar-header">
          <div class="logo">
            <span class="logo-icon">💬</span>
            <h1>카카오톡</h1>
          </div>
        </div>
        <div class="search-box">
          <input
            type="search"
            id="search-input"
            placeholder="검색"
            aria-label="검색"
          />
        </div>
        <div class="tab-bar" role="tablist">
          <button class="tab-btn active" role="tab" data-tab="chats" aria-selected="true">채팅</button>
          <button class="tab-btn" role="tab" data-tab="friends" aria-selected="false">친구</button>
        </div>
        <div class="sidebar-content">
          <div class="chat-list" id="chat-list" role="tabpanel"></div>
          <div class="friend-list" id="friend-list" role="tabpanel" aria-hidden="true"></div>
        </div>
        <div class="connection-bar connected" id="connection-bar" aria-live="polite">
          연결됨
        </div>
      </aside>

      <!-- Chat Area -->
      <main class="chat-area" id="chat-area" aria-label="채팅 영역">
        <div class="empty-state" id="empty-state">
          <span class="icon">💬</span>
          <p>대화방을 선택하면 대화가 시작됩니다</p>
        </div>

        <div class="chat-header" id="chat-header" style="display: none;">
          <button class="back-btn" id="back-btn" aria-label="뒤로 가기">←</button>
          <span class="chat-title" id="chat-title"></span>
          <span class="chat-status" id="chat-status">온라인</span>
        </div>

        <div class="messages" id="messages" style="display: none;" role="log" aria-label="메시지 목록" aria-live="polite"></div>

        <div class="input-area" id="input-area" style="display: none;">
          <textarea
            id="message-input"
            placeholder="메시지를 입력하세요"
            aria-label="메시지 입력"
            rows="1"
          ></textarea>
          <button class="send-btn" id="send-btn" aria-label="메시지 보내기">↑</button>
        </div>
      </main>
    </div>

    <!-- Error Toast -->
    <div class="error-toast" id="error-toast" role="alert" aria-live="assertive"></div>

    <script>
      "use strict";

      // ── Error Boundary ──
      const ErrorBoundary = (() => {
        const errors = [];
        const MAX_ERRORS = 50;

        return {
          capture(error, context = "") {
            const entry = {
              message: error.message || String(error),
              stack: error.stack || "",
              context,
              timestamp: Date.now(),
            };
            errors.push(entry);
            if (errors.length > MAX_ERRORS) errors.shift();
            console.error(`[KakaoTalk Error] ${context}:`, error);
            return entry;
          },
          getErrors() {
            return [...errors];
          },
          clear() {
            errors.length = 0;
          },
        };
      })();

      // ── Safe DOM Helpers ──
      const SafeDOM = {
        getById(id) {
          const el = document.getElementById(id);
          if (!el) {
            ErrorBoundary.capture(new Error(`Element #${id} not found`), "SafeDOM.getById");
          }
          return el;
        },
        setText(el, text) {
          if (el) el.textContent = text;
        },
        setStyle(el, styles) {
          if (el && styles) {
            Object.entries(styles).forEach(([k, v]) => {
              el.style[k] = v;
            });
          }
        },
        addClass(el, cls) {
          if (el && cls) el.classList.add(cls);
        },
        removeClass(el, cls) {
          if (el && cls) el.classList.remove(cls);
        },
        toggleClass(el, cls, force) {
          if (el && cls) el.classList.toggle(cls, force);
        },
      };

      // ── Connection Manager ──
      const ConnectionManager = (() => {
        let state = "connected"; // "connected" | "disconnected" | "reconnecting"
        let listeners = [];
        let reconnectTimer = null;
        let reconnectAttempts = 0;
        const MAX_RECONNECT_ATTEMPTS = 5;
        const RECONNECT_BASE_DELAY = 1000;

        function notify() {
          listeners.forEach((fn) => {
            try {
              fn(state);
            } catch (e) {
              ErrorBoundary.capture(e, "ConnectionManager.notify");
            }
          });
        }

        function scheduleReconnect() {
          if (reconnectAttempts >= MAX_RECONNECT_ATTEMPTS) {
            setState("disconnected");
            showToast("연결에 실패했습니다. 페이지를 새로고침해 주세요.");
            return;
          }

          setState("reconnecting");
          const delay = RECONNECT_BASE_DELAY * Math.pow(2, reconnectAttempts);
          reconnectTimer = setTimeout(() => {
            reconnectAttempts++;
            // Simulate reconnection attempt
            if (Math.random() > 0.3) {
              reconnectAttempts = 0;
              setState("connected");
            } else {
              scheduleReconnect();
            }
          }, delay);
        }

        function setState(newState) {
          state = newState;
          notify();
        }

        return {
          getState() {
            return state;
          },
          isOnline() {
            return state === "connected";
          },
          onStateChange(fn) {
            listeners.push(fn);
            return () => {
              listeners = listeners.filter((l) => l !== fn);
            };
          },
          simulateDisconnect() {
            clearTimeout(reconnectTimer);
            reconnectAttempts = 0;
            setState("disconnected");
            scheduleReconnect();
          },
          forceReconnect() {
            clearTimeout(reconnectTimer);
            reconnectAttempts = 0;
            setState("connected");
          },
          cleanup() {
            clearTimeout(reconnectTimer);
            listeners.length = 0;
          },
        };
      })();

      // ── Message Store (with localStorage persistence) ──
      const MessageStore = (() => {
        const STORAGE_KEY = "kakaotalk_messages_v1";
        let store = {};

        function load() {
          try {
            const raw = localStorage.getItem(STORAGE_KEY);
            if (raw) {
              store = JSON.parse(raw);
            }
          } catch (e) {
            ErrorBoundary.capture(e, "MessageStore.load");
            store = {};
          }
        }

        function save() {
          try {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(store));
          } catch (e) {
            ErrorBoundary.capture(e, "MessageStore.save");
            showToast("메시지 저장 공간이 부족합니다.");
          }
        }

        load();

        return {
          getMessages(chatId) {
            return store[chatId] || [];
          },
          addMessage(chatId, message) {
            if (!store[chatId]) store[chatId] = [];
            store[chatId].push(message);
            save();
          },
          updateMessage(chatId, messageId, updates) {
            const messages = store[chatId] || [];
            const idx = messages.findIndex((m) => m.id === messageId);
            if (idx !== -1) {
              Object.assign(messages[idx], updates);
              save();
            }
          },
          clear(chatId) {
            if (chatId) {
              delete store[chatId];
            } else {
              store = {};
            }
            save();
          },
        };
      })();

      // ── Send Message ──
      async function sendMessage(text) {
        if (!text.trim() || !activeChatId) return;
        if (!ConnectionManager.isOnline()) {
          showToast("오프라인 상태에서는 메시지를 보낼 수 없습니다.");
          return;
        }

        const msgId = `msg_${Date.now()}_${Math.random().toString(36).slice(2, 8)}`;
        const now = new Date();
        const timeStr = `오후 ${now.getHours()}:${String(now.getMinutes()).padStart(2, "0")}`;

        const message = {
          id: msgId,
          sender: "나",
          text: text.trim(),
          time: timeStr,
          type: "sent",
          status: "pending",
        };

        try {
          // Optimistic render
          MessageStore.addMessage(activeChatId, message);
          appendMessageToUI(message);
          DOM.messageInput.value = "";
          autoResizeTextarea();
          scrollToBottom();

          // Simulate network request with possible failure
          await simulateNetworkSend(message);

          // Mark as sent/read
          MessageStore.updateMessage(activeChatId, msgId, { status: "read" });
          updateMessageStatus(msgId, "read");

          // Simulate reply after delay
          simulateReply();
        } catch (e) {
          ErrorBoundary.capture(e, "sendMessage");
          MessageStore.updateMessage(activeChatId, msgId, { status: "failed" });
          updateMessageStatus(msgId, "failed");
          showToast("메시지 전송에 실패했습니다. 재전송해 주세요.");
        }
      }

      function simulateNetworkSend(message) {
        return new Promise((resolve, reject) => {
          const delay = 500 + Math.random() * 1500;
          setTimeout(() => {
            // 15% chance of failure to test error handling
            if (Math.random() < 0.15) {
              reject(new Error("Network error: 전송 실패"));
            } else {
              resolve();
            }
          }, delay);
        });
      }

      function appendMessageToUI(message) {
        if (!DOM.messages) return;

        const group = document.createElement("div");
        group.className = `message-group ${message.type}`;
        group.dataset.messageId = message.id;

        const meta = document.createElement("div");
        meta.className = "message-meta";

        const time = document.createElement("span");
        time.className = "message-time-stamp";
        time.textContent = message.time;
        meta.appendChild(time);

        const bubble = document.createElement("div");
        bubble.className = "message-bubble";
        if (message.status === "pending") bubble.classList.add("pending");
        bubble.textContent = message.text;

        group.appendChild(meta);
        group.appendChild(bubble);
        DOM.messages.appendChild(group);
      }

      function updateMessageStatus(msgId, status) {
        const group = DOM.messages?.querySelector(`[data-message-id="${msgId}"]`);
        if (!group) return;

        const bubble = group.querySelector(".message-bubble");
        if (!bubble) return;

        bubble.classList.remove("pending", "failed", "read");
        if (status) bubble.classList.add(status);

        // Remove old retry button if exists
        const oldRetry = bubble.querySelector(".retry-btn");
        if (oldRetry) oldRetry.remove();

        if (status === "failed") {
          bubble.textContent = bubble.textContent.replace("전송 중...", "");
          const retryBtn = document.createElement("button");
          retryBtn.className = "retry-btn";
          retryBtn.textContent = "↻ 재전송";
          retryBtn.addEventListener("click", () => retryMessage(msgId));
          bubble.appendChild(retryBtn);
        }
      }

      async function retryMessage(msgId) {
        if (!ConnectionManager.isOnline()) {
          showToast("오프라인 상태에서는 재전송할 수 없습니다.");
          return;
        }

        try {
          updateMessageStatus(msgId, "pending");
          await simulateNetworkSend({ id: msgId });
          MessageStore.updateMessage(activeChatId, msgId, { status: "read" });
          updateMessageStatus(msgId, "read");
        } catch (e) {
          ErrorBoundary.capture(e, "retryMessage");
          updateMessageStatus(msgId, "failed");
          showToast("재전송에 실패했습니다.");
        }
      }

      function simulateReply() {
        if (!activeChatId) return;

        const chat = CHATS.find((c) => c.id === activeChatId);
        if (!chat) return;

        const replies = [
          "알겠어요!",

        ];

        const delay = 1500 + Math.random() * 3000;
        setTimeout(() => {
          if (activeChatId !== chat.id) return;

          const replyMsg = {
            id: `reply_${Date.now()}`,
            sender: chat.name,
            text: replies[Math.floor(Math.random() * replies.length)],
            time: `오후 ${new Date().getHours()}:${String(new Date().getMinutes()).padStart(2, "0")}`,
            type: "received",
            status: "read",
          };

          MessageStore.addMessage(activeChatId, replyMsg);
          appendMessageToUI(replyMsg);
          scrollToBottom();
        }, delay);
      }

      function scrollToBottom() {
        requestAnimationFrame(() => {
          if (DOM.messages) {
            DOM.messages.scrollTop = DOM.messages.scrollHeight;
          }
        });
      }

      // ── Input State Management ──
      function updateInputState() {
        const isOnline = ConnectionManager.isOnline();
        if (DOM.messageInput) {
          DOM.messageInput.disabled = !isOnline;
          DOM.messageInput.placeholder = isOnline
            ? "메시지를 입력하세요"
            : "오프라인 상태입니다";
        }
        if (DOM.sendBtn) {
          DOM.sendBtn.disabled = !isOnline;
        }
      }

      // ── Auto-resize Textarea ──
      function autoResizeTextarea() {
        if (!DOM.messageInput) return;
        DOM.messageInput.style.height = "auto";
        DOM.messageInput.style.height =
          Math.min(DOM.messageInput.scrollHeight, 120) + "px";
      }

      // ── Refresh Sidebar ──
      function refreshSidebar() {
        if (activeTab === "chats") {
          renderChatList(DOM.searchInput?.value || "");
        } else {
          renderFriendList(DOM.searchInput?.value || "");
        }
      }

      // ── Tab Switching ──
      function setupTabs() {
        const tabBtns = document.querySelectorAll(".tab-btn");
        tabBtns.forEach((btn) => {
          btn.addEventListener("click", () => {
            tabBtns.forEach((b) => {
              b.classList.remove("active");
              b.setAttribute("aria-selected", "false");
            });
            btn.classList.add("active");
            btn.setAttribute("aria-selected", "true");

            activeTab = btn.dataset.tab;

            // Toggle panels
            if (activeTab === "friends") {
              SafeDOM.addClass(DOM.chatList, "hidden");
              SafeDOM.addClass(DOM.friendList, "visible");
              DOM.friendList?.setAttribute("aria-hidden", "false");
              DOM.chatList?.setAttribute("aria-hidden", "true");
              renderFriendList(DOM.searchInput?.value || "");
            } else {
              SafeDOM.removeClass(DOM.chatList, "hidden");
              SafeDOM.removeClass(DOM.friendList, "visible");
              DOM.friendList?.setAttribute("aria-hidden", "true");
              DOM.chatList?.setAttribute("aria-hidden", "false");
              renderChatList(DOM.searchInput?.value || "");
            }
          });
        });
      }

      // ── Connection UI Updates ──
      function setupConnectionUI() {
        ConnectionManager.onStateChange((state) => {
          if (!DOM.connectionBar) return;

          DOM.connectionBar.classList.remove("connected", "disconnected", "reconnecting");
          DOM.connectionBar.classList.add(state);

          const labels = {
            connected: "연결됨",
            disconnected: "연결 끊김",
            reconnecting: "재연결 중...",
          };
          SafeDOM.setText(DOM.connectionBar, labels[state] || state);

          updateInputState();

          if (state === "disconnected") {
            showToast("서버 연결이 끊어졌습니다.");
          } else if (state === "connected") {
            showToast("서버에 연결되었습니다.", 1500);
          }
        });
      }

      // ── Mobile Back Button ──
      function setupMobileNav() {
        if (DOM.backBtn) {
          DOM.backBtn.addEventListener("click", () => {
            SafeDOM.removeClass(DOM.chatArea, "active");
            SafeDOM.addClass(DOM.sidebar, "active");
            activeChatId = null;
            refreshSidebar();
          });
        }
      }

      // ── Search ──
      function setupSearch() {
        if (DOM.searchInput) {
          DOM.searchInput.addEventListener("input", (e) => {
            const value = e.target.value;
            if (activeTab === "chats") {
              renderChatList(value);
            } else {
              renderFriendList(value);
            }
          });
        }
      }

      // ── Message Input ──
      function setupMessageInput() {
        if (DOM.messageInput) {
          DOM.messageInput.addEventListener("keydown", (e) => {
            if (e.key === "Enter" && !e.shiftKey) {
              e.preventDefault();
              sendMessage(DOM.messageInput.value);
            }
          });
          DOM.messageInput.addEventListener("input", autoResizeTextarea);
        }

        if (DOM.sendBtn) {
          DOM.sendBtn.addEventListener("click", () => {
            if (DOM.messageInput) {
              sendMessage(DOM.messageInput.value);
            }
          });
        }
      }

      // ── Browser Online/Offline Events ──
      function setupNetworkEvents() {
        window.addEventListener("online", () => {
          ConnectionManager.forceReconnect();
        });

        window.addEventListener("offline", () => {
          ConnectionManager.simulateDisconnect();
        });
      }

      // ── Cleanup on Unload ──
      function setupCleanup() {
        window.addEventListener("beforeunload", () => {
          ConnectionManager.cleanup();
        });
      }

      // ── Initialize ──
      function init() {
        try {
          resolveDOM();
          renderChatList();
          renderFriendList();
          setupTabs();
          setupConnectionUI();
          setupMobileNav();
          setupSearch();
          setupMessageInput();
          setupNetworkEvents();
          setupCleanup();

          // Initial render from store
          CHATS.forEach((chat) => {
            const stored = MessageStore.getMessages(chat.id);
            if (stored.length > 0) {
              chat.messages = stored;
            }
          });
        } catch (e) {
          ErrorBoundary.capture(e, "init");
          showToast("앱 초기화 중 오류가 발생했습니다.");
        }
      }

      // Safe init
      if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", init);
      } else {
        init();
      }
    </script>
  </body>
</html>
