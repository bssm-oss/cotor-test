<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Test Studio</title>
    <style>
      :root {
        --bg: #f8efe6;
        --surface: rgba(255, 252, 248, 0.82);
        --text: #1f1a17;
        --muted: #65584f;
        --accent: #bf5a36;
        --accent-strong: #8f3d21;
        --border: rgba(31, 26, 23, 0.08);
        --shadow: 0 24px 60px rgba(62, 34, 22, 0.12);
        --radius: 24px;
        --radius-sm: 999px;
        --space-1: 8px;
        --space-2: 16px;
        --space-3: 24px;
        --space-4: 32px;
        --space-5: 48px;
        --space-6: 64px;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Avenir Next", "Noto Sans KR", sans-serif;
        background:
          radial-gradient(circle at top left, rgba(255, 255, 255, 0.95), transparent 34%),
          linear-gradient(135deg, #f7ead9 0%, #f6d3bf 52%, #efc7a5 100%);
        color: var(--text);
      }

      .shell {
        width: min(960px, calc(100% - 32px));
        margin: 0 auto;
        padding: var(--space-6) 0;
      }

      .hero {
        padding: var(--space-5);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        background: var(--surface);
        box-shadow: var(--shadow);
        backdrop-filter: blur(18px);
      }

      .eyebrow {
        display: inline-flex;
        align-items: center;
        min-height: 40px;
        padding: 0 var(--space-2);
        border-radius: var(--radius-sm);
        background: rgba(191, 90, 54, 0.12);
        color: var(--accent-strong);
        font-size: 0.9rem;
        font-weight: 700;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      h1 {
        margin: var(--space-3) 0 var(--space-2);
        font-size: clamp(2.8rem, 7vw, 5.5rem);
        line-height: 0.95;
        letter-spacing: -0.05em;
      }

      p {
        margin: 0;
      }

      .summary {
        max-width: 620px;
        color: var(--muted);
        font-size: 1.1rem;
        line-height: 1.7;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: var(--space-2);
        margin-top: var(--space-4);
      }

      .button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 160px;
        min-height: 48px;
        padding: 0 var(--space-3);
        border-radius: var(--radius-sm);
        border: 1px solid transparent;
        font-weight: 700;
        text-decoration: none;
        transition:
          transform 140ms ease,
          background-color 140ms ease,
          border-color 140ms ease;
      }

      .button:focus-visible {
        outline: 3px solid rgba(191, 90, 54, 0.3);
        outline-offset: 3px;
      }

      .button.primary {
        background: var(--accent);
        color: #fffaf5;
      }

      .button.primary:hover {
        background: var(--accent-strong);
        transform: translateY(-1px);
      }

      .button.secondary {
        border-color: rgba(31, 26, 23, 0.12);
        color: var(--text);
        background: rgba(255, 255, 255, 0.5);
      }

      .button.secondary:hover {
        border-color: rgba(31, 26, 23, 0.24);
        background: rgba(255, 255, 255, 0.72);
        transform: translateY(-1px);
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: var(--space-3);
        margin-top: var(--space-4);
      }

      .card {
        padding: var(--space-3);
        border-radius: 20px;
        background: rgba(255, 255, 255, 0.68);
        border: 1px solid rgba(31, 26, 23, 0.08);
      }

      .card strong {
        display: block;
        margin-bottom: var(--space-1);
        font-size: 1.05rem;
      }

      .card span {
        color: var(--muted);
        line-height: 1.6;
      }

      @media (max-width: 800px) {
        .hero {
          padding: var(--space-4);
        }

        .grid {
          grid-template-columns: 1fr;
        }
      }

      @media (max-width: 480px) {
        .shell {
          width: min(100% - 20px, 960px);
          padding: var(--space-4) 0;
        }

        .hero {
          padding: var(--space-3);
        }

        h1 {
          font-size: clamp(2.2rem, 14vw, 3.4rem);
        }

        .summary {
          font-size: 1rem;
        }

        .button {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <p class="eyebrow">Single-Page Website</p>
        <h1>아무 웹사이트 하나,<br />바로 열리는 형태로.</h1>
        <p class="summary">
          별도 설치나 빌드 없이 이 파일만 열면 보이는 간단한 랜딩 페이지입니다.
          빈 저장소에서도 검토할 수 있도록, 한 화면 안에 메시지와 기본 동작을 담았습니다.
        </p>
        <div class="actions">
          <a class="button primary" href="mailto:ceo@test.local">다음 결정 요청</a>
          <a class="button secondary" href="#details">구성 보기</a>
        </div>
        <div class="grid" id="details">
          <article class="card">
            <strong>즉시 확인</strong>
            <span>브라우저에서 `index.html`을 바로 열어 결과를 확인할 수 있습니다.</span>
          </article>
          <article class="card">
            <strong>최소 변경</strong>
            <span>저장소가 비어 있어 단일 정적 파일로 범위를 제한했습니다.</span>
          </article>
          <article class="card">
            <strong>후속 검토 용이</strong>
            <span>CEO가 다음 사이클에서 방향을 정하기 쉬운 기본 웹 결과물입니다.</span>
          </article>
        </div>
      </section>
    </main>
  </body>
</html>
