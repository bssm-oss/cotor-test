<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Test Landing Page</title>
    <style>
      :root {
        color-scheme: light;
        font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
        background: #f4f1ea;
        color: #1f2933;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top, rgba(233, 196, 106, 0.45), transparent 32%),
          linear-gradient(180deg, #fffdf8 0%, #f4f1ea 100%);
      }

      main {
        width: min(640px, calc(100% - 32px));
        padding: 40px;
        border: 1px solid rgba(31, 41, 51, 0.08);
        border-radius: 24px;
        background: rgba(255, 255, 255, 0.82);
        box-shadow: 0 24px 80px rgba(31, 41, 51, 0.12);
      }

      h1 {
        margin: 0 0 16px;
        font-size: clamp(2rem, 5vw, 3.5rem);
        line-height: 0.95;
        letter-spacing: -0.06em;
      }

      p {
        margin: 0;
        font-size: 1.05rem;
        line-height: 1.7;
        color: #52606d;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Test ships from a clean slate.</h1>
      <p>
        This branch was empty, so this page provides the smallest complete artifact
        for review and validation: a single static landing page that can be served
        directly from the repository.
      </p>
    </main>
  </body>
</html>
