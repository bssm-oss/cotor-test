<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Test Landing Page</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f4efe6;
        --ink: #1f1f1f;
        --panel: rgba(255, 255, 255, 0.82);
        --accent: #d75c37;
        --accent-ink: #fff7f2;
        --line: rgba(31, 31, 31, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Iowan Old Style", "Palatino Linotype", serif;
        color: var(--ink);
        background:
          radial-gradient(circle at top left, rgba(215, 92, 55, 0.18), transparent 34%),
          linear-gradient(160deg, #fcf8f3 0%, var(--bg) 55%, #efe4d2 100%);
      }

      main {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .hero {
        width: min(100%, 760px);
        padding: 48px;
        border: 1px solid var(--line);
        border-radius: 28px;
        background: var(--panel);
        backdrop-filter: blur(10px);
        box-shadow: 0 24px 60px rgba(74, 48, 28, 0.12);
      }

      .eyebrow {
        margin: 0 0 16px;
        font-size: 0.85rem;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-size: clamp(2.6rem, 8vw, 5.4rem);
        line-height: 0.95;
      }

      p {
        max-width: 38rem;
        margin: 20px 0 0;
        font-size: 1.1rem;
        line-height: 1.7;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 28px;
      }

      .button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 48px;
        padding: 0 18px;
        border-radius: 999px;
        border: 1px solid transparent;
        text-decoration: none;
        font-weight: 700;
      }

      .button.primary {
        background: var(--accent);
        color: var(--accent-ink);
      }

      .button.secondary {
        border-color: var(--line);
        color: var(--ink);
      }

      .footnote {
        margin-top: 28px;
        font-size: 0.95rem;
        color: rgba(31, 31, 31, 0.74);
      }

      @media (max-width: 640px) {
        .hero {
          padding: 32px 22px;
        }

        p {
          font-size: 1rem;
        }

        .actions {
          flex-direction: column;
        }

        .button {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="hero">
        <p class="eyebrow">Any Website</p>
        <h1>작지만 완결된 첫 웹사이트</h1>
        <p>
          비어 있는 저장소에 바로 열어볼 수 있는 정적 랜딩 페이지를 추가했습니다.
          별도 빌드 없이 `index.html` 하나로 동작하며, 다음 의사결정 사이클에서
          확장 여부를 판단할 수 있습니다.
        </p>
        <div class="actions">
          <a class="button primary" href="mailto:ceo@example.com">다음 피드백 보내기</a>
          <a class="button secondary" href="#handoff">현재 상태 확인</a>
        </div>
        <p class="footnote" id="handoff">
          현재 범위: 단일 정적 페이지, 반응형 레이아웃, 기본 CTA 포함.
        </p>
      </section>
    </main>
  </body>
</html>
